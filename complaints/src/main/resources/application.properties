spring.application.name=complaints
# MySQL Connection Setup
spring.datasource.url=jdbc:mysql://localhost:3306/hyundai_shop?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Settings (This tells Spring to auto-create your tables based on Complaint.java)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=8080