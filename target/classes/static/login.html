<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MobileShop â€“ Login</title>
        <link rel="stylesheet" href="css/login.css"/>
    <link rel="stylesheet" href="css/responsive.css?v=20260328a"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="css/no-overlay.css?v=20260327c"/>
</head>
<body class="auth-body">

<nav class="navbar">
    <div class="nav-brand">
        <a href="index.html"><i class="fa-solid fa-mobile-screen-button"></i> MobileShop</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon-wrap"><i class="fa-solid fa-right-to-bracket"></i></div>
            <h2>Welcome Back</h2>
            <p>Sign in to your account</p>
        </div>

        <!-- Tab Switch: Customer / Admin -->
        <div class="auth-tabs">
            <button class="tab-btn active" id="tabUser"  onclick="switchTab('user')">
                <i class="fa-solid fa-user"></i> Customer
            </button>
            <button class="tab-btn" id="tabAdmin" onclick="switchTab('admin')">
                <i class="fa-solid fa-shield-halved"></i> Admin
            </button>
        </div>

        <!-- User Login Form -->
        <form id="userLoginForm" onsubmit="handleUserLogin(event)">
            <div class="form-group">
                <label><i class="fa-solid fa-envelope"></i> Email</label>
                <input type="email" id="userEmail" placeholder="Enter your email" required/>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> Password</label>
                <div class="input-icon-wrap">
                    <input type="password" id="userPassword" placeholder="Enter your password" required/>
                    <i class="fa-solid fa-eye toggle-pass" onclick="togglePass('userPassword', this)"></i>
                </div>
            </div>
            <div id="userLoginError" class="error-msg" style="display:none"></div>
            <button type="submit" class="btn-primary btn-full" id="userLoginBtn">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
                <i class="fa-solid fa-spinner fa-spin btn-spinner" id="userSpinner" style="display:none"></i>
            </button>
        </form>

        <!-- Admin Login Form (hidden by default) -->
        <form id="adminLoginForm" onsubmit="handleAdminLogin(event)" style="display:none">
            <div class="form-group">
                <label><i class="fa-solid fa-envelope"></i> Admin Email</label>
                <input type="email" id="adminUsername" placeholder="admin@mobileshop.com" required/>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> Password</label>
                <div class="input-icon-wrap">
                    <input type="password" id="adminPassword" placeholder="Admin password" required/>
                    <i class="fa-solid fa-eye toggle-pass" onclick="togglePass('adminPassword', this)"></i>
                </div>
            </div>
            <div id="adminLoginError" class="error-msg" style="display:none"></div>
            <button type="submit" class="btn-primary btn-full btn-admin" id="adminLoginBtn">
                <i class="fa-solid fa-shield-halved"></i> Admin Sign In
                <i class="fa-solid fa-spinner fa-spin btn-spinner" id="adminSpinner" style="display:none"></i>
            </button>
        </form>

        <div id="userActions" class="auth-footer-links">
            <p class="auth-switch">New here? <a href="register.html">Create account</a></p>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script>
    if (getUser()) window.location.href = 'index.html';

    function switchTab(tab) {
        const isAdmin = tab === 'admin';
        document.getElementById('tabUser').classList.toggle('active', !isAdmin);
        document.getElementById('tabAdmin').classList.toggle('active', isAdmin);
        document.getElementById('userLoginForm').style.display  = isAdmin ? 'none' : 'block';
        document.getElementById('adminLoginForm').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('userActions').style.display    = isAdmin ? 'none' : 'block';
    }

    async function handleUserLogin(e) {
        e.preventDefault();
        const errDiv  = document.getElementById('userLoginError');
        const spinner = document.getElementById('userSpinner');
        const btn     = document.getElementById('userLoginBtn');
        errDiv.style.display = 'none';
        btn.disabled = true;
        spinner.style.display = 'inline-block';

        try {
            const res  = await fetch(`${API_BASE}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email:    document.getElementById('userEmail').value,
                    password: document.getElementById('userPassword').value
                })
            });
            const data = await res.json();
            if (data.success) {
                saveUser(data);
                window.location.href = 'index.html';
            } else {
                errDiv.textContent = data.message || 'Login failed';
                errDiv.style.display = 'block';
            }
        } catch {
            errDiv.textContent = 'Server error. Please try again.';
            errDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            spinner.style.display = 'none';
        }
    }

    async function handleAdminLogin(e) {
        e.preventDefault();
        const errDiv  = document.getElementById('adminLoginError');
        const spinner = document.getElementById('adminSpinner');
        const btn     = document.getElementById('adminLoginBtn');
        errDiv.style.display = 'none';
        btn.disabled = true;
        spinner.style.display = 'inline-block';

        try {
            const res  = await fetch(`${API_BASE}/admin/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('adminUsername').value,
                    password: document.getElementById('adminPassword').value
                })
            });
            const data = await res.json();
            if (data.success) {
                saveUser(data);
                window.location.href = 'admin.html';
            } else {
                errDiv.textContent = data.message || 'Invalid admin credentials';
                errDiv.style.display = 'block';
            }
        } catch {
            errDiv.textContent = 'Server error. Please try again.';
            errDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            spinner.style.display = 'none';
        }
    }
</script>
</body>
</html>
