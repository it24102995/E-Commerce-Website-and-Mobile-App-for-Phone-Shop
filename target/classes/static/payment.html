<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MobileShop â€“ Payment</title>
        <link rel="stylesheet" href="css/payment.css"/>
    <link rel="stylesheet" href="css/responsive.css?v=20260328a"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="css/no-overlay.css?v=20260327c"/>
</head>
<body class="auth-body">

<nav class="navbar">
    <div class="nav-brand">
        <a href="index.html"><i class="fa-solid fa-mobile-screen-button"></i> MobileShop</a>
    </div>
    <div class="nav-links">
        <a href="cart.html"><i class="fa-solid fa-arrow-left"></i> Back to Cart</a>
    </div>
</nav>

<div class="payment-container">
    <div class="payment-card">
        <div class="payment-header">
            <div class="auth-icon-wrap pay-icon"><i class="fa-solid fa-credit-card"></i></div>
            <h2>Secure Payment</h2>
            <p>Review your order and complete payment</p>
        </div>

        <!-- Order Summary -->
        <div class="pay-summary" id="paySummary">
            <h3><i class="fa-solid fa-list"></i> Order Review</h3>
            <div id="payItems"></div>
            <div class="pay-total-row">
                <span>Total</span>
                <span class="price" id="payTotal">LKR 0</span>
            </div>
        </div>

        <!-- Payment Method -->
        <div class="pay-methods">
            <h3><i class="fa-solid fa-wallet"></i> Payment Method</h3>
            <div class="method-grid">
                <label class="method-card selected" id="m-card">
                    <input type="radio" name="payment" value="CREDIT_CARD" checked onchange="selectMethod(this)"/>
                    <i class="fa-solid fa-credit-card"></i>
                    <span>Credit Card</span>
                </label>
                <label class="method-card" id="m-debit">
                    <input type="radio" name="payment" value="DEBIT_CARD" onchange="selectMethod(this)"/>
                    <i class="fa-solid fa-card-blank fa-regular"></i>
                    <span>Debit Card</span>
                </label>
                <label class="method-card" id="m-cod">
                    <input type="radio" name="payment" value="CASH_ON_DELIVERY" onchange="selectMethod(this)"/>
                    <i class="fa-solid fa-money-bill-wave"></i>
                    <span>Cash on Delivery</span>
                </label>
                <label class="method-card" id="m-bank">
                    <input type="radio" name="payment" value="BANK_TRANSFER" onchange="selectMethod(this)"/>
                    <i class="fa-solid fa-building-columns"></i>
                    <span>Bank Transfer</span>
                </label>
            </div>
        </div>

        <!-- Card Details (shown for card payments) -->
        <div id="cardDetails">
            <div class="form-group">
                <label><i class="fa-solid fa-credit-card"></i> Card Number</label>
                <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456"
                       maxlength="19" oninput="formatCard(this)"/>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)"/>
                </div>
                <div class="form-group">
                    <label>CVV</label>
                    <input type="password" id="cvv" placeholder="123" maxlength="4"/>
                </div>
            </div>
            <div class="form-group">
                <label>Name on Card</label>
                <input type="text" id="cardName" placeholder="Full name as on card"/>
            </div>
        </div>

        <div id="payError" class="error-msg" style="display:none"></div>

        <button class="btn-primary btn-full" id="payBtn" onclick="placeOrder()">
            <i class="fa-solid fa-lock"></i> Pay &amp; Place Order
            <i class="fa-solid fa-spinner fa-spin btn-spinner" id="paySpinner" style="display:none"></i>
        </button>
        <p class="secure-note"><i class="fa-solid fa-shield-halved"></i> Secured by MobileShop SSL</p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/app.js"></script>
<script>
    const user = getUser();
    if (!user || !user.userId) {
        alert('Your session has expired or you are logged in as admin.\nPlease log in as a customer to place orders.');
        window.location.href = 'login.html';
    }
    const cart = getCart();
    if (!cart.length) { window.location.href = 'cart.html'; }

    // Render order summary
    let payTotal = 0;
    document.getElementById('payItems').innerHTML = cart.map(item => {
        payTotal += item.price * item.quantity;
        return `<div class="pay-item-row">
            <span>${escHtml(item.name)} x${item.quantity}</span>
            <span class="price">LKR ${(item.price * item.quantity).toLocaleString()}</span>
        </div>`;
    }).join('');
    document.getElementById('payTotal').textContent = `LKR ${payTotal.toLocaleString()}`;

    function selectMethod(radio) {
        document.querySelectorAll('.method-card').forEach(c => c.classList.remove('selected'));
        radio.closest('.method-card').classList.add('selected');
        const isCash = radio.value === 'CASH_ON_DELIVERY' || radio.value === 'BANK_TRANSFER';
        document.getElementById('cardDetails').style.display = isCash ? 'none' : 'block';
    }

    function formatCard(input) {
        let v = input.value.replace(/\D/g,'').substring(0,16);
        input.value = v.replace(/(.{4})/g,'$1 ').trim();
    }

    function formatExpiry(input) {
        let v = input.value.replace(/\D/g,'').substring(0,4);
        if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2);
        input.value = v;
    }

    async function placeOrder() {
        const errDiv  = document.getElementById('payError');
        const spinner = document.getElementById('paySpinner');
        const btn     = document.getElementById('payBtn');
        errDiv.style.display = 'none';

        const method = document.querySelector('input[name="payment"]:checked').value;

        // Validate card fields for card payments
        if (method !== 'CASH_ON_DELIVERY' && method !== 'BANK_TRANSFER') {
            const num  = document.getElementById('cardNumber').value.replace(/\s/g,'');
            const exp  = document.getElementById('expiry').value;
            const cvv  = document.getElementById('cvv').value;
            const name = document.getElementById('cardName').value.trim();
            if (num.length < 16) { errDiv.textContent = 'Enter a valid 16-digit card number'; errDiv.style.display='block'; return; }
            if (!exp.match(/^\d{2}\/\d{2}$/)) { errDiv.textContent = 'Enter expiry as MM/YY'; errDiv.style.display='block'; return; }
            if (cvv.length < 3) { errDiv.textContent = 'Enter a valid CVV'; errDiv.style.display='block'; return; }
            if (!name) { errDiv.textContent = 'Enter name on card'; errDiv.style.display='block'; return; }
        }

        // Final safety check â€” userId must exist
        const uid = user && Number(user.userId);
        if (!uid) {
            errDiv.textContent = 'Session expired. Please log out and log in again as a customer.';
            errDiv.style.display = 'block';
            return;
        }

        // Refresh cart at point-of-sale to pick up any migrated qtyâ†’quantity data
        const freshCart = getCart();
        if (!freshCart.length) { window.location.href = 'cart.html'; return; }

        btn.disabled = true;
        spinner.style.display = 'inline-block';

        try {
            const res  = await fetch(`${API_BASE}/order`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    userId: uid,
                    items:  freshCart.map(i => ({ productId: i.id, quantity: Number(i.quantity) || 1 })),
                    paymentMethod: method
                })
            });
            const data = await res.json();
            if (data.success) {
                saveCart([]);
                updateCartBadge();
                showToastGlobal('Order placed successfully!', 'success');
                setTimeout(() => window.location.href = 'orders.html', 1400);
            } else {
                errDiv.textContent = data.message || 'Order failed. Please try again.';
                errDiv.style.display = 'block';
            }
        } catch {
            errDiv.textContent = 'Server error. Please try again.';
            errDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            spinner.style.display = 'none';
        }
    }
</script>
</body>
</html>
