<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HYUNDAI PREMIER – Register</title>
        <link rel="stylesheet" href="css/register.css"/>
    <link rel="stylesheet" href="css/responsive.css?v=20260328a"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="css/no-overlay.css?v=20260327c"/>
</head>
<body class="auth-body">

<nav class="navbar">
    <div class="nav-brand">
        <a href="home.html"><i class="fa-solid fa-mobile-screen-button"></i> HYUNDAI PREMIER</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon-wrap"><i class="fa-solid fa-user-plus"></i></div>
            <h2>Create Account</h2>
            <p>Join HYUNDAI PREMIER and start shopping</p>
        </div>

        <div class="auth-tabs" style="display:flex;margin-bottom:1.5rem;gap:0.5rem;border-bottom:1px solid #eee;padding-bottom:1rem">
            <button class="tab-btn active" id="tabCustomerReg" onclick="switchRegTab('customer')" style="flex:1;padding:0.5rem;border:none;background:none;font-weight:bold;cursor:pointer;border-bottom:2px solid #3b82f6">Customer</button>
            <button class="tab-btn" id="tabRiderReg" onclick="switchRegTab('rider')" style="flex:1;padding:0.5rem;border:none;background:none;font-weight:bold;cursor:pointer;color:#666">Rider</button>
        </div>

        <form id="registerForm" onsubmit="handleRegister(event)" novalidate>
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required minlength="2"/>
                <span class="field-error" id="nameErr"></span>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-envelope"></i> Email</label>
                <input type="email" id="email" placeholder="Enter your email" required/>
                <span class="field-error" id="emailErr"></span>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> Password</label>
                <div class="input-icon-wrap">
                    <input type="password" id="password" placeholder="Min 6 characters" required minlength="6"/>
                    <i class="fa-solid fa-eye toggle-pass" onclick="togglePass('password', this)"></i>
                </div>
                <div class="password-strength" id="passStrength"></div>
                <span class="field-error" id="passErr"></span>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> Confirm Password</label>
                <div class="input-icon-wrap">
                    <input type="password" id="confirmPass" placeholder="Repeat your password" required/>
                    <i class="fa-solid fa-eye toggle-pass" onclick="togglePass('confirmPass', this)"></i>
                </div>
                <span class="field-error" id="confirmErr"></span>
            </div>

            <div id="registerError"   class="error-msg"   style="display:none"></div>
            <div id="registerSuccess" class="success-msg" style="display:none"></div>

            <button type="submit" class="btn-primary btn-full" id="registerBtn">
                <i class="fa-solid fa-user-plus"></i> Create Account
                <i class="fa-solid fa-spinner fa-spin btn-spinner" id="regSpinner" style="display:none"></i>
            </button>
        </form>

        <!-- Rider Register Form (hidden by default) -->
        <form id="riderRegisterForm" onsubmit="handleRiderRegister(event)" style="display:none">
            <div class="form-group">
                <label><i class="fa-solid fa-user"></i> Full Name</label>
                <input type="text" id="riderName" placeholder="Enter full name" required/>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-envelope"></i> Email</label>
                <input type="email" id="riderRegEmail" placeholder="Enter email" required/>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-phone"></i> Phone Number</label>
                <input type="text" id="riderPhone" placeholder="Enter phone number" required/>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-car"></i> Vehicle Number</label>
                <input type="text" id="riderVehicle" placeholder="Enter vehicle number" required/>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="riderRegPassword" placeholder="Min 6 characters" required/>
            </div>
            <div id="riderRegError" class="error-msg" style="display:none"></div>
            <div id="riderRegSuccess" class="success-msg" style="display:none"></div>
            <button type="submit" class="btn-primary btn-full" id="riderRegBtn">
                <i class="fa-solid fa-truck"></i> Join as Rider
                <i class="fa-solid fa-spinner fa-spin btn-spinner" id="riderRegSpinner" style="display:none"></i>
            </button>
        </form>

        <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
</div>

<script src="js/app.js"></script>
<script>
    if (getUser()) window.location.href = 'home.html';

    // Live password strength
    document.getElementById('password').addEventListener('input', function() {
        const val = this.value;
        const bar = document.getElementById('passStrength');
        let score = 0;
        if (val.length >= 6) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = ['', 'weak', 'fair', 'good', 'strong'];
        bar.className = 'password-strength ' + (levels[score] || '');
        bar.textContent = val.length ? (levels[score] ? levels[score].charAt(0).toUpperCase() + levels[score].slice(1) : '') : '';
    });

    function clearErrors() {
        ['nameErr','emailErr','passErr','confirmErr'].forEach(id => {
            document.getElementById(id).textContent = '';
        });
    }

    async function handleRegister(e) {
        e.preventDefault();
        clearErrors();
        const btn     = document.getElementById('registerBtn');
        const spinner = document.getElementById('regSpinner');
        const errDiv  = document.getElementById('registerError');
        const okDiv   = document.getElementById('registerSuccess');
        errDiv.style.display = 'none';
        okDiv.style.display  = 'none';

        const name     = document.getElementById('name').value.trim();
        const email    = document.getElementById('email').value.trim();
        const pass     = document.getElementById('password').value;
        const confirm  = document.getElementById('confirmPass').value;

        // Client-side validation
        let valid = true;
        if (name.length < 2) {
            document.getElementById('nameErr').textContent = 'Name must be at least 2 characters';
            valid = false;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            document.getElementById('emailErr').textContent = 'Enter a valid email address';
            valid = false;
        }
        if (pass.length < 6) {
            document.getElementById('passErr').textContent = 'Password must be at least 6 characters';
            valid = false;
        }
        if (pass !== confirm) {
            document.getElementById('confirmErr').textContent = 'Passwords do not match';
            valid = false;
        }
        if (!valid) return;

        btn.disabled = true;
        spinner.style.display = 'inline-block';

        try {
            const res  = await fetch(`${API_BASE}/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, email, password: pass })
            });
            const data = await res.json();
            if (data.success) {
                okDiv.textContent = 'Account created! Redirecting to login…';
                okDiv.style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                errDiv.textContent = data.message || 'Registration failed';
                errDiv.style.display = 'block';
            }
        } catch {
            errDiv.textContent = 'Server error. Please try again.';
            errDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            spinner.style.display = 'none';
        }
    }

    async function handleRiderRegister(e) {
        e.preventDefault();
        const btn     = document.getElementById('riderRegBtn');
        const spinner = document.getElementById('riderRegSpinner');
        const errDiv  = document.getElementById('riderRegError');
        const okDiv   = document.getElementById('riderRegSuccess');
        
        errDiv.style.display = 'none';
        okDiv.style.display  = 'none';
        btn.disabled = true;
        spinner.style.display = 'inline-block';

        const payload = {
            name: document.getElementById('riderName').value,
            email: document.getElementById('riderRegEmail').value,
            phoneNumber: document.getElementById('riderPhone').value,
            vehicleNumber: document.getElementById('riderVehicle').value,
            password: document.getElementById('riderRegPassword').value
        };

        try {
            const res = await fetch('/api/riders/signup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                okDiv.textContent = 'Rider account created! Redirecting to login…';
                okDiv.style.display = 'block';
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                errDiv.textContent = 'Registration failed. Email might already be taken.';
                errDiv.style.display = 'block';
            }
        } catch {
            errDiv.textContent = 'Server error. Please try again.';
            errDiv.style.display = 'block';
        } finally {
            btn.disabled = false;
            spinner.style.display = 'none';
        }
    }

    function switchRegTab(tab) {
        const isRider = tab === 'rider';
        document.getElementById('tabCustomerReg').style.borderBottom = isRider ? 'none' : '2px solid #3b82f6';
        document.getElementById('tabCustomerReg').style.color = isRider ? '#666' : '#3b82f6';
        document.getElementById('tabRiderReg').style.borderBottom = isRider ? '2px solid #3b82f6' : 'none';
        document.getElementById('tabRiderReg').style.color = isRider ? '#3b82f6' : '#666';
        
        document.getElementById('registerForm').style.display = isRider ? 'none' : 'block';
        document.getElementById('riderRegisterForm').style.display = isRider ? 'block' : 'none';
    }

    // Handle role from query param
    window.addEventListener('load', () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('role') === 'rider') {
            switchRegTab('rider');
        }
    });
</script>
</body>
</html>
