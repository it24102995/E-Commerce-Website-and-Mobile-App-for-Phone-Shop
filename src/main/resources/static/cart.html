<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MobileShop â€“ Cart</title>
        <link rel="stylesheet" href="css/cart.css"/>
    <link rel="stylesheet" href="css/responsive.css?v=20260328a"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="css/no-overlay.css?v=20260327c"/>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">
        <a href="index.html"><i class="fa-solid fa-mobile-screen-button"></i> MobileShop</a>
    </div>
    <div class="nav-links">
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="cart.html" class="active"><i class="fa-solid fa-cart-shopping"></i> Cart <span id="cartBadge" class="badge">0</span></a>
        <a href="orders.html"><i class="fa-solid fa-box"></i> My Orders</a>
        <a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a>
        <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
        <span id="authButtons">
            <a href="login.html" class="btn-nav">Login</a>
        </span>
        <span id="userGreeting" style="display:none">
            <span class="greeting-text"></span>
            <a href="#" onclick="logout()" class="btn-nav btn-outline">Logout</a>
        </span>
    </div>
</nav>

<div class="cart-container">
    <h1 class="section-title"><i class="fa-solid fa-cart-shopping"></i> Your Cart</h1>

    <div class="cart-layout" id="cartLayout">
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-summary" id="cartSummary">
            <h3>Order Summary</h3>
            <div class="summary-row"><span>Subtotal</span><span id="subtotal">LKR 0</span></div>
            <div class="summary-row"><span>Shipping</span><span class="text-success">Free</span></div>
            <div class="summary-row total-row"><span>Total</span><span id="totalAmount">LKR 0</span></div>
            <button class="btn-primary btn-full" onclick="goToCheckout()">
                <i class="fa-solid fa-credit-card"></i> Proceed to Payment
            </button>
            <a href="index.html" class="btn-outline-full">
                <i class="fa-solid fa-arrow-left"></i> Continue Shopping
            </a>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/app.js"></script>
<script>
    initNavbar();
    renderCartPage();

    function renderCartPage() {
        const cart      = getCart();
        const container = document.getElementById('cartItems');
        let total = 0;

        if (!cart.length) {
            container.innerHTML = `
                <div class="empty-cart">
                    <i class="fa-solid fa-cart-shopping fa-3x"></i>
                    <h3>Your cart is empty</h3>
                    <p>Start browsing and add products to your cart.</p>
                    <a href="index.html" class="btn-primary">Shop Now</a>
                </div>`;
            document.getElementById('subtotal').textContent    = 'LKR 0';
            document.getElementById('totalAmount').textContent = 'LKR 0';
            return;
        }

        container.innerHTML = cart.map(item => {
            total += item.price * item.quantity;
            return `
            <div class="cart-item animate-in" id="ci_${item.id}">
                <img src="${item.image || 'https://via.placeholder.com/80'}"
                     class="cart-item-img" alt="${item.name}"
                     onerror="this.src='https://via.placeholder.com/80'"/>
                <div class="cart-item-info">
                    <h4>${escHtml(item.name)}</h4>
                    <p class="item-price">LKR ${item.price.toLocaleString()}</p>
                </div>
                <div class="qty-controls">
                    <button onclick="changeQty(${item.id}, -1)"><i class="fa-solid fa-minus"></i></button>
                    <span>${item.quantity}</span>
                    <button onclick="changeQty(${item.id}, 1)"><i class="fa-solid fa-plus"></i></button>
                </div>
                <p class="item-sub">LKR ${(item.price * item.quantity).toLocaleString()}</p>
                <button class="remove-btn" onclick="removeFromCart(${item.id})">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>`;
        }).join('');

        document.getElementById('subtotal').textContent    = `LKR ${total.toLocaleString()}`;
        document.getElementById('totalAmount').textContent = `LKR ${total.toLocaleString()}`;
    }

    function changeQty(id, delta) {
        const cart = getCart();
        const idx  = cart.findIndex(i => i.id === id);
        if (idx === -1) return;
        cart[idx].quantity += delta;
        if (cart[idx].quantity <= 0) cart.splice(idx, 1);
        saveCart(cart);
        updateCartBadge();
        renderCartPage();
    }

    function removeFromCart(id) {
        saveCart(getCart().filter(i => i.id !== id));
        updateCartBadge();
        renderCartPage();
    }

    function goToCheckout() {
        const user = getUser();
        if (!user) {
            showToastGlobal('Please login to place an order', 'error');
            setTimeout(() => window.location.href = 'login.html', 1200);
            return;
        }
        if (!getCart().length) {
            showToastGlobal('Your cart is empty!', 'error');
            return;
        }
        window.location.href = 'payment.html';
    }
</script>
</body>
</html>
